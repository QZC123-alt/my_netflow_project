<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NetFlow简单测试</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="app" class="container mt-4">
        <h2>🌊 NetFlow API测试</h2>
        
        <div class="alert" :class="alertClass" role="alert">
            {{ message }}
        </div>

        <div class="row">
            <div class="col-md-6">
                <button class="btn btn-primary mb-3" @click="testAPI" :disabled="loading">
                    {{ loading ? '测试中...' : '测试API连接' }}
                </button>
            </div>
            <div class="col-md-6 text-end">
                <span class="badge bg-success" v-if="apiStatus">API在线</span>
                <span class="badge bg-danger" v-else>API离线</span>
            </div>
        </div>

        <div class="card" v-if="apiData">
            <div class="card-header">
                <h5>API响应数据</h5>
            </div>
            <div class="card-body">
                <pre>{{ JSON.stringify(apiData,, 2) }}</pre>
            </div>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                loading: false,
                apiStatus: false,
                message: '点击按钮测试API连接',
                alertClass: 'alert-info',
                apiData:
            },
            methods: {
                async testAPI() {
                    this.loading = true;
                    this.message = '正在测试API连接...';
                    this.alertClass = 'alert-info';
                    
                    try {
                        console.log('开始请求API...');
                        
                        const response = await axios.get('http://127.0.0.1:8000/api/health');
                        
                        console.log('API响应:', response.data);
                        
                        this.apiData = response.data;
                        this.apiStatus = response.data.success;
                        
                        if (this.apiStatus) {
                            this.message = `✅ API连接成功！数据库记录数: ${response.data.record_count}`;
                            this.alertClass = 'alert-success';
                        } else {
                            this.message = '❌ API返回错误';
                            this.alertClass = 'alert-danger';
                        }
                        
                    } catch (error) {
                        console.error('API错误:', error);
                        
                        this.apiStatus = false;
                        this.message = `❌ 连接失败: ${error.message}`;
                        this.alertClass = 'alert-danger';
                        this.apiData = { error: error.message };
                    } finally {
                        this.loading = false;
                    }
                }
            }
        });
    </script>
</body>
</html>
